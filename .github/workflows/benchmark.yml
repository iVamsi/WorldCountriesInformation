# Manual macrobenchmark run on emulator (self-instrumenting :benchmark module).
name: Macrobenchmark

on:
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false

jobs:
  macrobenchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools platforms;android-37

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run macrobenchmarks on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew :benchmark:connectedCheck --stacktrace

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: macrobenchmark-reports
          path: |
            benchmark/build/reports/**
            benchmark/build/outputs/**
          if-no-files-found: ignore
