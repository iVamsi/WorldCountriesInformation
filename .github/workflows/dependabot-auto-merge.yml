# Enables GitHub auto-merge on Dependabot PRs. The merge happens only after
# required checks (e.g. Android CI) succeed — turn on "Allow auto-merge" in
# Repo settings → General → Pull requests.

name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable squash merge when checks pass
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
